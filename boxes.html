<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width:100px;
            height:100px;
            background-color:green;
            margin:20px;
        }
        .box1{
           width:500px;
           background-color:skyblue;
           padding:20px;
           text-align:center;
           margin:20px;  
        }
        .box2{
           width:500px;
           background-color:blueviolet;
           border:10px solid black;
           padding:20px;
           margin:20px;  
        }
        .box3{
           width:500px;
           background-color:red;
           border:10px solid blue;
           border-radius:15px;
           padding:20px;
           margin:20px;  
        }
        .circle{
            width:100px;
            height:100px;
            background-color:orange;
            border-radius:50%;
            margin:20px;
        }
        .box4{
           width:500px;
           background-color:pink;
           border:10px solid grey;
           padding:10px 20px 30px 40px;
           margin:20px;  
        }
        .box5{
           width:500px;
           background-color:aqua;
           border:10px solid peru;
           padding:20px;
           margin:auto;  
        }
        .box6{
           width:500px;
           background-color:brown;
           border:10px dashed slateblue;
           padding:20px;
           margin:20px;  
        }
        .box7{
           width:500px;
           background-color:cadetblue;
           padding:20px;
           opacity:0.5;
           color:white;  
        }
    </style>
</head>
<body>
   <div class="box"></div>
   <div class="box1">
    <h2>Cascading Style Sheets</h2>
   </div>
   <div class="box2">
    <h2>Hyper Text Markup Language</h2>
   </div>
   <div class="box3">
    <h2>Rounded edges</h2>
   </div>
   <div class="circle"></div>
   <div class="box4">
    <h2>Shorthand Padding</h2>
   </div>
   <div class="box5">
    <h2>Auto margin</h2>
   </div>
   <div class="box6">
    <h2>Border styles</h2>
   </div>
   <div class="box7">
    <h2>Transparent box</h2>
   </div>
</body>
</html>
